<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central WhatsApp — Clínica</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:#C9847A;--rose-light:#E8B4AE;--nude:#F5EDE8;
    --gold:#C4A882;--gold-light:#EAD9C4;--dark:#2C1F1A;
    --mid:#7A5C52;--white:#FDFAF8;--green-wpp:#DCF8C6;
    --green-fid:#E8F5E9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--dark);}
  header{background:linear-gradient(135deg,#2C1F1A 0%,#4A2E26 55%,#C9847A 100%);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden;}
  header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 40%,rgba(201,132,122,0.3) 0%,transparent 65%);}
  header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,4vw,2.1rem);font-weight:300;color:var(--nude);letter-spacing:0.04em;position:relative;}
  header p{font-size:0.75rem;color:var(--rose-light);margin-top:7px;letter-spacing:0.12em;text-transform:uppercase;position:relative;}
  .tab-bar{background:#fff;border-bottom:2px solid var(--gold-light);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(44,31,26,0.07);}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:13px 18px;font-size:0.78rem;font-weight:500;color:var(--mid);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;white-space:nowrap;transition:all 0.2s;}
  .tab-btn:hover{color:var(--rose);}
  .tab-btn.active{color:var(--rose);border-bottom-color:var(--rose);}
  .subnav-wrap{background:var(--nude);border-bottom:1px solid var(--gold-light);display:none;}
  .subnav-wrap.visible{display:block;}
  .subnav-scroll{display:flex;overflow-x:auto;gap:4px;padding:10px 16px;scrollbar-width:none;}
  .subnav-scroll::-webkit-scrollbar{display:none;}
  .subnav-btn{flex-shrink:0;background:#fff;border:1px solid var(--gold-light);border-radius:20px;padding:5px 13px;font-size:0.71rem;color:var(--mid);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.03em;transition:all 0.2s;white-space:nowrap;}
  .subnav-btn:hover,.subnav-btn.active{background:linear-gradient(135deg,var(--rose),var(--gold));border-color:transparent;color:white;}
  .container{max-width:740px;margin:0 auto;padding:30px 20px 60px;}
  .painel{display:none;animation:fadeIn 0.3s ease;}
  .painel.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .procedimento{display:none;animation:fadeIn 0.3s ease;}
  .procedimento.active{display:block;}
  .proc-title{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:400;color:var(--dark);margin-bottom:4px;}
  .proc-preco{font-size:0.75rem;color:var(--rose);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--gold-light);}
  .etapa{margin-bottom:30px;}
  .etapa-header{display:flex;align-items:flex-start;gap:13px;margin-bottom:11px;}
  .etapa-num{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--gold));color:white;font-size:0.74rem;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .etapa-titulo{font-size:0.93rem;font-weight:500;color:var(--dark);line-height:1.3;}
  .etapa-quando{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--rose);margin-top:3px;}
  .variante-label{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--mid);margin:14px 0 7px;padding-left:2px;}
  .variante-label.fid{color:#5a8a5a;}
  .wpp-bubble{background:var(--green-wpp);border-radius:0 16px 16px 16px;padding:13px 15px;position:relative;box-shadow:0 2px 8px rgba(44,31,26,0.07);line-height:1.65;font-size:0.865rem;color:#1a1a1a;white-space:pre-wrap;word-break:break-word;}
  .wpp-bubble.fidelizada{background:var(--green-fid);border-left:3px solid #81c784;}
  .wpp-bubble::before{content:'';position:absolute;top:0;left:-8px;border-width:0 9px 9px 0;border-style:solid;border-color:transparent var(--green-wpp) transparent transparent;}
  .wpp-bubble.fidelizada::before{border-color:transparent var(--green-fid) transparent transparent;}
  .wpp-time{font-size:0.67rem;color:#999;text-align:right;margin-top:5px;}
  .copy-btn{margin-top:7px;background:none;border:1px solid var(--gold-light);border-radius:20px;padding:5px 13px;font-size:0.71rem;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;transition:all 0.2s;}
  .copy-btn:hover{background:var(--gold-light);color:var(--dark);}
  .copy-btn.copied{background:#DCF8C6;border-color:#a8d8a0;color:#3a7a3a;}
  .divisor{display:flex;align-items:center;gap:12px;margin:4px 0 20px 46px;}
  .divisor-line{flex:1;height:1px;background:linear-gradient(to right,var(--gold-light),transparent);}
  .divisor-icon{color:var(--rose-light);font-size:0.85rem;}
  .sec-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:var(--dark);margin-bottom:4px;}
  .sec-sub{font-size:0.73rem;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--gold-light);}
  .grupo-titulo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--dark);margin:28px 0 14px;display:flex;align-items:center;gap:8px;}
  .grupo-titulo::after{content:'';flex:1;height:1px;background:var(--gold-light);}
  .cuidados-box{background:#fff;border:1px solid var(--gold-light);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
  .cuidados-box h4{font-size:0.8rem;font-weight:500;color:var(--rose);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
  .cuidado-item{display:flex;gap:10px;align-items:flex-start;font-size:0.84rem;color:var(--dark);line-height:1.5;margin-bottom:7px;}
  .cuidado-item:last-child{margin-bottom:0;}
  .cuidado-dot{color:var(--rose);font-size:1rem;flex-shrink:0;margin-top:1px;}
  .fid-badge{display:inline-block;background:#e8f5e9;color:#4caf50;font-size:0.63rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border-radius:10px;padding:2px 8px;margin-left:6px;vertical-align:middle;border:1px solid #a5d6a7;}
  footer{text-align:center;padding:26px 20px;font-size:0.73rem;color:var(--mid);border-top:1px solid var(--gold-light);font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:0.05em;}
</style>
</head>
<body>
<header>
  <h1>Central de Mensagens — WhatsApp</h1>
  <p>Captação · Lembretes · Pós-Procedimento · Resgate</p>
</header>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="captacao">💬 Captação</button>
  <button class="tab-btn" data-tab="lembretes">📅 Lembretes</button>
  <button class="tab-btn" data-tab="pos">🌿 Pós-Procedimento</button>
  <button class="tab-btn" data-tab="resgate">💛 Resgate</button>
</div>
<div class="subnav-wrap visible" id="subnav-captacao"><div class="subnav-scroll" id="nav-captacao"></div></div>
<div class="subnav-wrap" id="subnav-pos"><div class="subnav-scroll" id="nav-pos"></div></div>
<div class="subnav-wrap" id="subnav-lembretes"><div class="subnav-scroll" id="nav-lembretes"></div></div>
<div class="container">
  <div class="painel active" id="painel-captacao"></div>
  <div class="painel" id="painel-lembretes"></div>
  <div class="painel" id="painel-pos"></div>
  <div class="painel" id="painel-resgate"></div>
</div>
<footer>Substitua [nome] pelo nome da paciente antes de enviar 🌸</footer>
<script>

document.addEventListener('DOMContentLoaded', function() {
try {

// ─── HELPER: gera etapas padrão de captação ───────────────
function etapasPadrao(proc, preco1, parcela, fidelizadaTexto){
  return [
    { num:"01", titulo:"Primeira resposta — Apresentar valor antes do preço", quando:"Quando a paciente pergunta o preço",
      mensagens:[
        { label:"Versão padrão", texto:proc.msgPadrao },
        { label:"Versão fidelizada 💚", fid:true, texto:fidelizadaTexto }
      ]
    },
    { num:"02", titulo:"Paciente pede desconto", quando:"Quando ela questiona o valor", mensagens:[{ label:null, texto:proc.msgDesconto }] },
    { num:"03", titulo:"Paciente sumiu após ver o preço", quando:"1º follow-up — após 2 a 3 dias sem resposta",
      mensagens:[
        { label:"Versão A — Leve e curiosa", texto:proc.msgSumiu_A },
        { label:"Versão B — Urgência suave", texto:proc.msgSumiu_B }
      ]
    },
    { num:"04", titulo:"Paciente ainda não respondeu", quando:"2º follow-up — após mais 3 a 5 dias", mensagens:[{ label:null, texto:proc.msgSilencio }] },
    { num:"05", titulo:"Reativação futura", quando:"Após 2 a 4 semanas", mensagens:[{ label:null, texto:proc.msgReativacao }] }
  ];
}

// ─── DADOS CAPTAÇÃO ───────────────────────────────────────
const procRaw = [
  {
    id:"botox", nome:"Toxina Botulínica", emoji:"✨",
    preco:"3 regiões / 50U — À vista: R$ 1.300,00 · Parcelado: 6x de R$ 241,67",
    msgPadrao:`*Olá, [nome]!* 😊\n\nQue bom que você está pensando em cuidar da sua expressão! A toxina botulínica é o procedimento mais solicitado no mundo — e com razão: ela suaviza linhas de expressão, previne o envelhecimento e dá um visual mais descansado e renovado, de forma completamente natural.\n\nAqui trabalho com técnica personalizada para o seu rosto, respeitando a sua expressão e garantindo um resultado harmônico e seguro. 🤍\n\nO investimento para *3 regiões (50U)* é:\n💳 *À vista: R$ 1.300,00*\n📆 *Parcelado: 6x de R$ 241,67*\n\nQuer saber mais ou já agendamos sua avaliação?\n\nTe espero! 🌸`,
    msgFidelizada:`*[Nome], amor!* 😊🌸\n\nQue saudades! Fico tão feliz que você está pensando em renovar a toxina botulínica — você já sabe como o resultado fica lindo em você!\n\nComo você já é da família aqui da clínica, fica à vontade para agendar quando quiser que eu já separo o seu horário com carinho. 🤍\n\nO investimento continua:\n💳 *À vista: R$ 1.300,00*\n📆 *Parcelado: 6x de R$ 241,67*\n\nMe fala um dia bom pra você! 💛`,
    msgDesconto:`[Nome], entendo que o investimento é uma consideração importante! 😊\n\nA toxina botulínica exige produto registrado, dose calibrada e aplicação com precisão milimétrica. O valor reflete qualidade, segurança e um resultado que dura.\n\nO que posso oferecer é parcelar em *6x de R$ 241,67* — acessível sem comprometer nada.\n\nQue tal agendarmos sua avaliação? 🌸`,
    msgSumiu_A:`*Oi, [nome]!* 😊\n\nSó passando para ver se ficou alguma dúvida sobre a toxina botulínica! Sabe que às vezes a gente precisa de um tempo — e tá tudo bem. Se quiser conversar, estou aqui! 🤍`,
    msgSumiu_B:`*Oi, [nome], tudo bem?* 🌸\n\nMinha agenda desse mês está quase fechada e lembrei que você tinha interesse na toxina botulínica.\n\nO resultado é transformador quando feito com a técnica certa — e é exatamente isso que ofereço aqui. 🤍\n\nSe quiser garantir seu horário, é só me falar! 😊`,
    msgSilencio:`*[Nome], tudo bem?* 💛\n\nNão quero ser insistente, mas não podia deixar de mandar uma última mensagem.\n\nA toxina botulínica bem aplicada deixa o seu rosto tão descansado e leve quanto você merece parecer. ✨\n\nQuando quiser, a agenda está aberta. 🌸`,
    msgReativacao:`*Oi, [nome]!* 🌸\n\nFaz um tempinho que conversamos e lembrei de você! Abriram horários novos essa semana — se a vontade ainda estiver por aí, pode me chamar. 🤍`
  },
  {
    id:"olheiras", nome:"Preench. Olheiras", emoji:"👁",
    preco:"1ml ácido hialurônico — R$ 1.350,00 por seringa · Parcelado: 6x de R$ 225,00",
    msgPadrao:`*Olá, [nome]!* 😊\n\nQue ótimo que você está pensando em tratar as olheiras! O preenchimento com ácido hialurônico é uma das técnicas mais delicadas e transformadoras da medicina estética — ele preenche o sulco, atenua as sombras e devolve leveza ao olhar, sem aparência artificial.\n\nAqui utilizo produto de alta qualidade com técnica cuidadosa e personalizada. 🤍\n\nO investimento é *R$ 1.350,00 por seringa (1ml)*:\n💳 *À vista: R$ 1.350,00*\n📆 *Parcelado: 6x de R$ 225,00*\n\n*O número de seringas depende da sua avaliação individual.*\n\nQuer saber mais ou já agendamos? Te espero! 🌸`,
    msgFidelizada:`*[Nome], que bom te ver por aqui!* 👁🌸\n\nVocê já conhece o quanto eu gosto de cuidar do seu olhar — e fico feliz que esteja pensando nessa renovação!\n\nPara você, minha paciente especial, o investimento é:\n💳 *À vista: R$ 1.350,00 por seringa*\n📆 *Parcelado: 6x de R$ 225,00*\n\nSó me fala quando quiser agendar que eu já reservo o seu horário com todo carinho. 🤍💛`,
    msgDesconto:`[Nome], entendo! 😊\n\nO preenchimento de olheiras é uma das técnicas mais exigentes da estética — região delicada, produto de alta qualidade e domínio técnico. O valor reflete isso.\n\nO parcelamento em *6x de R$ 225,00* torna bem mais acessível. 🤍\n\nQue tal uma avaliação presencial? Assim explico tudo e você decide com calma. 🌸`,
    msgSumiu_A:`*Oi, [nome]!* 😊\n\nSó passando para ver se ficou alguma dúvida sobre o preenchimento de olheiras! Se quiser conversar mais, estou aqui. 🤍`,
    msgSumiu_B:`*Oi, [nome], tudo bem?* 🌸\n\nMinha agenda está quase completa esse mês e lembrei que você tinha interesse no preenchimento de olheiras.\n\nUm olhar leve e descansado transforma o rosto inteiro. 🤍 Se quiser garantir seu horário, é só me falar! 😊`,
    msgSilencio:`*[Nome], tudo bem?* 💛\n\nÚltima mensagem, prometo! O olhar descansado que o preenchimento de olheiras proporciona é um dos resultados mais marcantes que vejo aqui na clínica.\n\nQuando quiser, a agenda está aberta. 🌸`,
    msgReativacao:`*Oi, [nome]!* 🌸\n\nFaz um tempinho que conversamos! Abriram horários novos essa semana — se o interesse no preenchimento de olheiras ainda estiver por aí, pode me chamar. 🤍`
  },
  {
    id:"labial", nome:"Preench. Labial", emoji:"💋",
    preco:"1ml ácido hialurônico — À vista: R$ 1.200,00 · Parcelado: 6x de R$ 216,67",
    msgPadrao:`*Olá, [nome]!* 😊\n\nQue ótimo que você está pensando em cuidar dos seus lábios! O preenchimento labial devolve volume, define o contorno e deixa tudo mais equilibrado, sem aquele aspecto exagerado.\n\nAqui utilizo ácido hialurônico de alta qualidade, com técnica personalizada para o seu formato de lábio. 🤍\n\nO investimento é:\n💳 *À vista: R$ 1.200,00*\n📆 *Parcelado: 6x de R$ 216,67*\n\nQuer saber mais ou já agendamos? Te espero! 🌸`,
    msgFidelizada:`*[Nome], minha querida!* 💋😊\n\nQue delícia receber sua mensagem! Você já sabe como o resultado fica maravilhoso em você — tenho saudades dos seus lábios na clínica! 🌸\n\nPara você:\n💳 *À vista: R$ 1.200,00*\n📆 *Parcelado: 6x de R$ 216,67*\n\nMe fala quando você quer vir e eu já separo o horário. 🤍💛`,
    msgDesconto:`[Nome], entendo! 😊\n\nO preenchimento labial envolve material de alta qualidade, técnica especializada e toda a segurança que você merece. O parcelamento em *6x de R$ 216,67* torna bem mais acessível.\n\nQue tal agendarmos sua avaliação? 🌸`,
    msgSumiu_A:`*Oi, [nome]!* 😊\n\nSó passando para ver se ficou alguma dúvida sobre o preenchimento labial! Se quiser conversar mais, estou aqui. 🤍`,
    msgSumiu_B:`*Oi, [nome], tudo bem?* 🌸\n\nMinha agenda desse mês está quase fechada e lembrei que você tinha interesse no preenchimento labial.\n\nO resultado é lindo quando feito com cuidado e técnica. 🤍 Se quiser garantir seu horário, é só me falar! 😊`,
    msgSilencio:`*[Nome], tudo bem?* 💛\n\nNão podia deixar de mandar uma última mensagem. O preenchimento labial bem feito só realça o que já é bonito em você. ✨\n\nQuando quiser, a agenda está aberta. 🌸`,
    msgReativacao:`*Oi, [nome]!* 🌸\n\nFaz um tempinho que conversamos! Abriram horários novos essa semana — se o interesse no preenchimento labial ainda estiver por aí, pode me chamar. 🤍`
  },
  {
    id:"microagulhamento", nome:"Microagulhamento", emoji:"🔬",
    preco:"Sessão avulsa: R$ 510,00 · Pacote 3 sessões: R$ 1.320,00 · Parcelado: 6x de R$ 220,00",
    msgPadrao:`*Olá, [nome]!* 😊\n\nÓtima escolha! O microagulhamento é um dos procedimentos mais versáteis e eficazes da estética — indicado para cicatrizes de acne, melasma, estrias, rejuvenescimento, alopecia e muito mais.\n\nAqui trabalho com ativos personalizados para o seu caso. 🤍\n\nO investimento é:\n✨ *Sessão avulsa: R$ 510,00*\n💎 *Pacote 3 sessões: R$ 1.320,00* (economia de R$ 210,00)\n📆 *Pacote parcelado: 6x de R$ 220,00*\n\nO pacote é o mais indicado, já que os resultados se potencializam com as sessões sequenciais!\n\nQuer saber mais ou já agendamos? 🌸`,
    msgFidelizada:`*[Nome], que bom!* 🔬😊\n\nVocê já sabe como a sua pele responde bem ao microagulhamento — e fico feliz que esteja pensando em continuar o tratamento!\n\nPara você:\n✨ *Sessão avulsa: R$ 510,00*\n💎 *Pacote 3 sessões: R$ 1.320,00*\n📆 *Parcelado: 6x de R$ 220,00*\n\nSó me fala quando quiser retomar que já reservo o seu dia. 🤍💛`,
    msgDesconto:`[Nome], entendo! 😊\n\nO microagulhamento envolve equipamento profissional, ativos específicos e técnica criteriosa para garantir segurança e resultado.\n\nO *pacote de 3 sessões por R$ 1.320,00* já é uma economia real — e pode ser parcelado em *6x de R$ 220,00*. 🤍\n\nQue tal agendarmos uma avaliação? 🌸`,
    msgSumiu_A:`*Oi, [nome]!* 😊\n\nSó passando para ver se ficou alguma dúvida sobre o microagulhamento! Se quiser conversar mais, estou aqui. 🤍`,
    msgSumiu_B:`*Oi, [nome], tudo bem?* 🌸\n\nMinha agenda está quase completa esse mês e lembrei que você tinha interesse no microagulhamento.\n\nA transformação que esse tratamento proporciona na pele começa já nas primeiras sessões. 🤍 Se quiser garantir seu horário, é só me falar! 😊`,
    msgSilencio:`*[Nome], tudo bem?* 💛\n\nÚltima mensagem! O microagulhamento bem feito transforma a textura da pele de um jeito que a gente sente e vê.\n\nQuando quiser, a agenda está aberta. 🌸`,
    msgReativacao:`*Oi, [nome]!* 🌸\n\nFaz um tempinho que conversamos! Abriram horários novos essa semana — se o interesse no microagulhamento ainda estiver por aí, pode me chamar. 🤍`
  },
  {
    id:"escleroterapia", nome:"Escleroterapia", emoji:"🩺",
    preco:"Sessão: R$ 410,00 · À vista: R$ 380,00 · Parcelado: 6x de R$ 68,33",
    msgPadrao:`*Olá, [nome]!* 😊\n\nQue bom que você está buscando tratamento para os microvasos! A escleroterapia é o procedimento mais eficaz e seguro para eliminar vasinhos nas pernas — feita com injeções precisas que fazem os vasos desaparecerem progressivamente.\n\nAqui trabalho com técnica cuidadosa e produto de qualidade. 🤍\n\nO investimento é:\n💳 *À vista: R$ 380,00*\n🧾 *Sessão: R$ 410,00*\n📆 *Parcelado: 6x de R$ 68,33*\n\n*O número de sessões varia conforme a extensão dos vasinhos.*\n\nQuer saber mais ou já agendamos? 🌸`,
    msgFidelizada:`*[Nome], oi!* 🩺😊\n\nQue bom que está pensando em continuar o tratamento dos vasinhos! Você já sabe como o resultado vai ficando cada vez melhor com as sessões.\n\nPara você:\n💳 *À vista: R$ 380,00*\n🧾 *Sessão: R$ 410,00*\n📆 *Parcelado: 6x de R$ 68,33*\n\nSó me fala quando quiser agendar! 🌸🤍`,
    msgDesconto:`[Nome], entendo! 😊\n\nA escleroterapia exige técnica precisa e atenção redobrada à segurança — o valor reflete isso. Já trabalhamos com preço acessível, e o parcelamento em *6x de R$ 68,33* torna ainda mais fácil começar! 🤍\n\nQue tal agendarmos uma avaliação? 🌸`,
    msgSumiu_A:`*Oi, [nome]!* 😊\n\nSó passando para ver se ficou alguma dúvida sobre a escleroterapia! Se quiser saber mais, estou aqui. 🤍`,

const navCaptacao = document.getElementById('nav-captacao');
const painelCaptacao = document.getElementById('painel-captacao');

procedimentos.forEach((proc, i) => {
  const btn = document.createElement('button');
  btn.className = 'subnav-btn'+(i===0?' active':'');
  btn.textContent = proc.emoji+' '+proc.nome;
  btn.onclick = () => {
    navCaptacao.querySelectorAll('.subnav-btn').forEach(b=>b.classList.remove('active'));
    painelCaptacao.querySelectorAll('.procedimento').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('cap-'+proc.id).classList.add('active');
    btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  };
  navCaptacao.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'procedimento'+(i===0?' active':'');
  div.id = 'cap-'+proc.id;

  let html = `<div class="proc-title">${proc.emoji} ${proc.nome}</div><div class="proc-preco">${proc.preco}</div>`;
  proc.etapas.forEach((etapa, ei) => {
    if(ei>0) html += `<div class="divisor"><div class="divisor-line"></div><div class="divisor-icon">✦</div><div class="divisor-line"></div></div>`;
    html += `<div class="etapa"><div class="etapa-header"><div class="etapa-num">${etapa.num}</div><div class="etapa-info"><div class="etapa-titulo">${etapa.titulo}</div><div class="etapa-quando">${etapa.quando}</div></div></div>`;
    etapa.mensagens.forEach((msg, mi) => {
      const id = `cap-${proc.id}-${ei}-${mi}`;
      if(msg.label){
        const isFid = msg.fid;
        html += `<div class="variante-label${isFid?' fid':''}">${msg.label}${isFid?'<span class="fid-badge">fidelizada</span>':''}</div>`;

    html += `</div>`;
  });
  div.innerHTML = html;
  painelCaptacao.appendChild(div);
});

  secao.grupos.forEach((grupo, gi) => {
    rHtml += `<div class="grupo-titulo">${grupo.nome}</div>`;
    grupo.msgs.forEach((msg, mi) => {
      const id = `res-${gi}-${mi}-${Math.random().toString(36).substr(2,5)}`;
      if(mi>0) rHtml += `<div class="divisor"><div class="divisor-line"></div><div class="divisor-icon">✦</div><div class="divisor-line"></div></div>`;
      rHtml += `<div class="etapa"><div class="etapa-header"><div class="etapa-num">0${mi+1}</div><div class="etapa-info"><div class="etapa-titulo">${msg.titulo}</div></div></div><div class="wpp-bubble" id="${id}">${esc(msg.texto)}<div class="wpp-time">✓✓</div></div><button class="copy-btn" onclick="copiar(this,'${id}')">Copiar mensagem</button></div>`;
    });
  });
  rHtml += `<br>`;
});
painelResgate.innerHTML = rHtml;

// ─── UTILITÁRIOS ──────────────────────────────────────────
function esc(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*]+)\*/g,'<strong>$1</strong>');
}
function copiar(btn,id){
  const el=document.getElementById(id);
  let text=el.innerText.replace('✓✓','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ Copiado!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copiar mensagem';btn.classList.remove('copied');},2000);
  });
}
function showTab(tab, clickedBtn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.painel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.subnav-wrap').forEach(s=>s.classList.remove('visible'));
  if(clickedBtn) clickedBtn.classList.add('active');
  var painel = document.getElementById('painel-'+tab);
  if(painel) painel.classList.add('active');
  if(['captacao','pos','lembretes'].includes(tab)){
    var subnav = document.getElementById('subnav-'+tab);
    if(subnav) subnav.classList.add('visible');
  }
}

// Tab click listeners
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    showTab(this.getAttribute('data-tab'), this);
  });
});

} catch(e) {
  document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace">Erro JS: ' + e.message + '<br>' + e.stack + '</div>';
}
});

</script>
